<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 3px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>API测试页面</h1>

    <div class="test-section">
        <h2>1. 检查Token</h2>
        <button onclick="checkToken()">检查Token</button>
        <div id="tokenResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. 登录</h2>
        <input type="text" id="username" placeholder="用户名" value="admin">
        <input type="password" id="password" placeholder="密码">
        <button onclick="testLogin()">登录</button>
        <div id="loginResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. 获取分类</h2>
        <button onclick="testGetCategories()">获取分类</button>
        <div id="categoriesResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. 获取网址</h2>
        <button onclick="testGetBookmarks()">获取网址</button>
        <div id="bookmarksResult" class="result"></div>
    </div>

    <script>
        const API_BASE = '/api';

        function checkToken() {
            const token = localStorage.getItem('admin_token');
            const user = localStorage.getItem('admin_user');
            document.getElementById('tokenResult').innerHTML = 
                `Token: ${token ? '存在' : '不存在'}\n` +
                `User: ${user ? user : '不存在'}`;
        }

        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                const resultDiv = document.getElementById('loginResult');
                
                if (response.ok) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', JSON.stringify(data.user));
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `登录成功！\nToken: ${data.token.substring(0, 20)}...\nUser: ${JSON.stringify(data.user, null, 2)}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `登录失败：${data.error}`;
                }
            } catch (error) {
                const resultDiv = document.getElementById('loginResult');
                resultDiv.className = 'result error';
                resultDiv.textContent = `请求失败：${error.message}`;
            }
        }

        async function testGetCategories() {
            const token = localStorage.getItem('admin_token');
            
            try {
                const response = await fetch(`${API_BASE}/categories`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                const resultDiv = document.getElementById('categoriesResult');
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `获取成功！\n分类数量: ${data.length}\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `获取失败：${data.error}`;
                }
            } catch (error) {
                const resultDiv = document.getElementById('categoriesResult');
                resultDiv.className = 'result error';
                resultDiv.textContent = `请求失败：${error.message}`;
            }
        }

        async function testGetBookmarks() {
            const token = localStorage.getItem('admin_token');
            
            try {
                const response = await fetch(`${API_BASE}/bookmarks`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                const resultDiv = document.getElementById('bookmarksResult');
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `获取成功！\n网址数量: ${data.length}\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `获取失败：${data.error}`;
                }
            } catch (error) {
                const resultDiv = document.getElementById('bookmarksResult');
                resultDiv.className = 'result error';
                resultDiv.textContent = `请求失败：${error.message}`;
            }
        }

        checkToken();
    </script>
</body>
</html>
